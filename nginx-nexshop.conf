# /etc/nginx/sites-available/nexshop.conf
# Aktifkan dengan: sudo ln -s /etc/nginx/sites-available/nexshop.conf /etc/nginx/sites-enabled/
# lalu: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name nexshop.cloud www.nexshop.cloud;

    # Nginx defaultnya cuma terima body request maks 1MB — banner promo/foto
    # gampang lebih dari itu, jadi upload gagal (413 Request Entity Too Large)
    # SEBELUM sempat sampai ke backend Node.js sama sekali. Naikkin ke 20MB.
    client_max_body_size 20M;

    # Frontend (toko) di root
    root /var/www/nexshop/frontend;
    index index.html;

    # CSP: gantiin file _headers (itu format Netlify, gak dibaca nginx).
    # Sengaja ketat: gak ada script eksternal yang dimuat lagi di index.html
    # sekarang (iPaymu cuma redirect halaman penuh, bukan snap.js/iframe),
    # jadi cukup 'self' + Google Fonts buat CSS/font.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://nexshop.cloud" always;

    # Backend API -> Node.js/PM2 di port 3000
    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Halaman admin, misal nexshop.cloud/admin/login.html
    location /admin/ {
        alias /var/www/nexshop/admin/;
        try_files $uri $uri/ =404;
    }

    # Frontend toko (bukan SPA, jadi cukup coba file aslinya lebih dulu)
    location / {
        try_files $uri $uri/ =404;
    }
}

# Setelah domain diarahkan & DNS propagasi, jalankan:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d nexshop.cloud -d www.nexshop.cloud
# certbot otomatis nambahin block listen 443 ssl + redirect 80->443
