# /etc/nginx/sites-available/nexshop.conf
# Aktifkan dengan: sudo ln -s /etc/nginx/sites-available/nexshop.conf /etc/nginx/sites-enabled/
# lalu: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name nexshop.cloud www.nexshop.cloud;

    # Frontend (toko) di root
    root /var/www/nexshop/frontend;
    index index.html;

    # Backend API -> Node.js/PM2 di port 3000
    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Halaman admin, misal nexshop.cloud/admin/login.html
    location /admin/ {
        alias /var/www/nexshop/admin/;
        try_files $uri $uri/ =404;
    }

    # Frontend toko (bukan SPA, jadi cukup coba file aslinya lebih dulu)
    location / {
        try_files $uri $uri/ =404;
    }
}

# Setelah domain diarahkan & DNS propagasi, jalankan:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d nexshop.cloud -d www.nexshop.cloud
# certbot otomatis nambahin block listen 443 ssl + redirect 80->443
