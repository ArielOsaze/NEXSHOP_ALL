<svg viewBox="0 0 1600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0B14"/>
      <stop offset="55%" stop-color="#150F2A"/>
      <stop offset="100%" stop-color="#0B0F1D"/>
    </linearGradient>
    <radialGradient id="glowRed" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E63946" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#E63946" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowWhite" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCyan3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="redWhite" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E63946"/>
      <stop offset="100%" stop-color="#FF8FA3"/>
    </linearGradient>
    <pattern id="grid3" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#E63946" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <mask id="gridMask3">
      <radialGradient id="gridFade3" cx="30%" cy="45%" r="75%">
        <stop offset="0%" stop-color="#fff"/>
        <stop offset="100%" stop-color="#000"/>
      </radialGradient>
      <rect width="1600" height="600" fill="url(#gridFade3)"/>
    </mask>
    <filter id="softGlow3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="600" fill="url(#bg3)"/>
  <rect width="1600" height="600" fill="url(#grid3)" mask="url(#gridMask3)"/>
  <circle cx="1250" cy="150" r="300" fill="url(#glowRed)"/>
  <circle cx="1250" cy="150" r="180" fill="url(#glowWhite)"/>
  <circle cx="250" cy="470" r="280" fill="url(#glowCyan3)"/>

  <!-- faint giant "81" (81st anniversary), background numeral -->
  <text x="1120" y="430" font-family="'Rajdhani',sans-serif" font-weight="700" font-size="360" fill="#FFFFFF" fill-opacity="0.05" text-anchor="middle">81</text>

  <!-- bunting flags (umbul-umbul), top edge -->
  <g opacity="0.85">
    <path d="M60 0 L60 60 L15 30 Z" fill="url(#redWhite)"/>
    <path d="M130 0 L130 60 L175 30 Z" fill="#F5F5F5" fill-opacity="0.85"/>
    <path d="M200 0 L200 60 L155 30 Z" fill="url(#redWhite)"/>
    <path d="M1400 0 L1400 60 L1445 30 Z" fill="url(#redWhite)"/>
    <path d="M1470 0 L1470 60 L1425 30 Z" fill="#F5F5F5" fill-opacity="0.85"/>
    <path d="M1540 0 L1540 60 L1585 30 Z" fill="url(#redWhite)"/>
  </g>
  <line x1="0" y1="0" x2="1600" y2="0" stroke="#E63946" stroke-opacity="0.3" stroke-width="2"/>

  <!-- firework bursts -->
  <g filter="url(#softGlow3)" stroke-linecap="round">
    <g transform="translate(1240,150)" stroke="#FF8FA3" stroke-width="3" opacity="0.9">
      <line x1="0" y1="-70" x2="0" y2="-30"/>
      <line x1="0" y1="70" x2="0" y2="30"/>
      <line x1="-70" y1="0" x2="-30" y2="0"/>
      <line x1="70" y1="0" x2="30" y2="0"/>
      <line x1="-50" y1="-50" x2="-22" y2="-22"/>
      <line x1="50" y1="-50" x2="22" y2="-22"/>
      <line x1="-50" y1="50" x2="-22" y2="22"/>
      <line x1="50" y1="50" x2="22" y2="22"/>
    </g>
    <circle cx="1240" cy="150" r="10" fill="#FFFFFF"/>
  </g>
  <g filter="url(#softGlow3)" stroke-linecap="round" opacity="0.6">
    <g transform="translate(1420,280) scale(0.6)" stroke="#22D3EE" stroke-width="3">
      <line x1="0" y1="-70" x2="0" y2="-30"/>
      <line x1="0" y1="70" x2="0" y2="30"/>
      <line x1="-70" y1="0" x2="-30" y2="0"/>
      <line x1="70" y1="0" x2="30" y2="0"/>
    </g>
    <circle cx="1420" cy="280" r="7" fill="#D8F5FF"/>
  </g>
  <g filter="url(#softGlow3)" stroke-linecap="round" opacity="0.5">
    <g transform="translate(150,120) scale(0.5)" stroke="#8B5CF6" stroke-width="3">
      <line x1="0" y1="-70" x2="0" y2="-30"/>
      <line x1="0" y1="70" x2="0" y2="30"/>
      <line x1="-70" y1="0" x2="-30" y2="0"/>
      <line x1="70" y1="0" x2="30" y2="0"/>
    </g>
  </g>

  <!-- confetti particles -->
  <g>
    <rect x="1080" y="90" width="8" height="8" fill="#E63946" opacity="0.8" transform="rotate(20 1084 94)"/>
    <rect x="1500" y="180" width="7" height="7" fill="#F5F5F5" opacity="0.8" transform="rotate(-15 1503 183)"/>
    <rect x="1330" y="470" width="8" height="8" fill="#22D3EE" opacity="0.7" transform="rotate(35 1334 474)"/>
    <circle cx="1050" cy="220" r="4" fill="#F5F5F5" opacity="0.7"/>
    <circle cx="1560" cy="360" r="4" fill="#E63946" opacity="0.6"/>
    <circle cx="200" cy="380" r="4" fill="#22D3EE" opacity="0.6"/>
  </g>

  <!-- subtle red-white diagonal ribbon accent, bottom -->
  <polygon points="0,600 1600,600 1600,560 0,600" fill="url(#redWhite)" opacity="0.15"/>
</svg>
